<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yn-search demo</title>
    <style>
      :root {
        --bg-fill: rgba(255, 255, 255, 0);
        --icon-color: #241f21;
        --placeholder: #6f6a6d;
      }

      @font-face {
        font-family: "Zimula";
        src: url("https://www.floema.com/_nuxt/Zimula-Variable.Cb2n2uX-.ttf") format("truetype");
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f2f4f8;
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .demo-card {
        width: 760px;
        padding: 28px;
        border-radius: 12px;
        background: #a87373;
        border: 1px solid #3f4c68;
      }

      .search-shell {
        position: relative;
        width: 568px;
        height: 38px;
      }

      .left-shape {
        position: absolute;
        top: 0;
        left: 0;
        width: 44px;
        height: 38px;
        fill: var(--bg-fill);
        transition: fill 260ms cubic-bezier(0.2, 0, 0.2, 1);
      }

      .left-shape path {
        stroke: var(--bg-fill);
        stroke-width: 0.65;
        stroke-linejoin: round;
        stroke-linecap: round;
        transition:
          fill 260ms cubic-bezier(0.2, 0, 0.2, 1),
          stroke 260ms cubic-bezier(0.2, 0, 0.2, 1);
      }

      .dynamic-wrap {
        position: absolute;
        top: 0;
        left: 44px;
        width: 524px;
        height: 38px;
        overflow: hidden;
        opacity: 1;
        pointer-events: none;
      }

      .search-shell.open .dynamic-wrap {
        transform: scaleX(1);
        opacity: 1;
        pointer-events: auto;
      }

      .shape {
        position: absolute;
        top: 0;
        left: 0;
        width: 524px;
        height: 38px;
        fill: var(--bg-fill);
        transition: fill 260ms cubic-bezier(0.2, 0, 0.2, 1);
      }

      .shape path {
        stroke: var(--bg-fill);
        stroke-width: 0.65;
        stroke-linejoin: round;
        stroke-linecap: round;
        transition:
          fill 260ms cubic-bezier(0.2, 0, 0.2, 1),
          stroke 260ms cubic-bezier(0.2, 0, 0.2, 1);
      }

      .toggle-btn {
        position: absolute;
        left: 0;
        top: 0;
        width: 44px;
        height: 38px;
        border: 0;
        background: transparent;
        color: var(--icon-color);
        cursor: pointer;
        display: grid;
        place-items: center;
        z-index: 2;
      }

      .icon {
        position: absolute;
        width: 20px;
        height: 20px;
        transition:
          opacity 0.2s ease,
          transform 0.38s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .icon.search {
        opacity: 1;
        transform: scale(1);
      }

      .icon.close {
        opacity: 0;
        transform: scale(0.7) rotate(-80deg);
      }

      .search-shell.open .toggle-btn .icon.search {
        opacity: 0;
        transform: scale(0.7) rotate(80deg);
      }

      .search-shell.open .toggle-btn .icon.close {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }

      .search-input {
        position: absolute;
        top: 0;
        left: 0;
        width: 514px;
        margin-left: 10px;
      }

      .search-input .inner {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 38px;
        padding: 2px 10px;
        pointer-events: none;
      }

      .search-shell.open .search-input .inner {
        pointer-events: auto;
      }

      .field {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: #241f21b3;
        font-family: "Zimula", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: clamp(12px, 10.83px + 100vw * 0.003, 16px);
        font-variation-settings: "cnct" 1000, "wght" 500;
        letter-spacing: -0.02em;
        line-height: 1.4em;
        caret-color: #241f21;
        padding-left: min(3px, 3px + 100vw * 0);
        opacity: 0;
        transform: translateX(-10px);
        transition: none;
      }

      .search-shell.open .field {
        opacity: 1;
        transform: translateX(0px);
      }

      .field::placeholder {
        color: #241f2199;
      }

      @media only screen and (max-width: 1023px) {
        .field,
        .field::placeholder {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo-card">
      <div id="searchShell" class="search-shell">
        <svg class="left-shape" viewBox="0 0 44 38" data-meta-row-shape>
          <path
            d="M0 12.920000000000002 A12.920000000000002 12.920000000000002 0 0 1 12.920000000000002 0 L31.08 0 A12.920000000000002 12.920000000000002 0 0 1 44 12.920000000000002 L44 25.08 A12.920000000000002 12.920000000000002 0 0 1 31.08 38 L12.920000000000002 38 A12.920000000000002 12.920000000000002 0 0 1 0 25.08 Z"
          ></path>
        </svg>

        <div id="dynamicWrap" class="dynamic-wrap">
          <svg id="shape" class="shape" viewBox="44 0 524 38" data-meta-row-shape>
            <path id="bridge" data-meta-row-shape-bridges d=""></path>
            <path
              id="rect1"
              data-meta-row-rect="1"
              d="M54 12.920000000000002 A12.920000000000002 12.920000000000002 0 0 1 66.92 0 L555.08 0 A12.920000000000002 12.920000000000002 0 0 1 568 12.920000000000002 L568 25.08 A12.920000000000002 12.920000000000002 0 0 1 555.08 38 L66.92 38 A12.920000000000002 12.920000000000002 0 0 1 54 25.08 Z"
            ></path>
          </svg>

          <div class="search-input">
            <div class="inner">
              <input id="searchInput" class="field" placeholder="O que estás à procura?" />
            </div>
          </div>
        </div>

        <button id="toggleBtn" class="toggle-btn" type="button" aria-label="toggle search">
          <svg class="icon search" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M4.36328 9.01777C4.36328 6.4477 6.44673 4.36426 9.01679 4.36426C11.5869 4.36426 13.6703 6.4477 13.6703 9.01777C13.6703 11.5878 11.5869 13.6713 9.01679 13.6713C6.44673 13.6713 4.36328 11.5878 4.36328 9.01777ZM9.01679 2.86426C5.6183 2.86426 2.86328 5.61928 2.86328 9.01777C2.86328 12.4163 5.6183 15.1713 9.01679 15.1713C10.0496 15.1713 11.0229 14.9168 11.8776 14.4673C12.4367 14.1731 13.1414 14.2027 13.5881 14.6495L15.8548 16.9162C16.1477 17.2091 16.6226 17.2091 16.9155 16.9162C17.2084 16.6233 17.2084 16.1484 16.9155 15.8555L14.6487 13.5887C14.202 13.142 14.1723 12.4374 14.4664 11.8783C14.9159 11.0237 15.1703 10.0504 15.1703 9.01777C15.1703 5.61928 12.4153 2.86426 9.01679 2.86426Z"
              fill="#241F21"
            />
          </svg>

          <svg class="icon close" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M5.53033 4.46967C5.23744 4.17678 4.76256 4.17678 4.46967 4.46967C4.17678 4.76256 4.17678 5.23744 4.46967 5.53033L8.05741 9.11807C8.54556 9.60623 8.54556 10.3977 8.05741 10.8858L4.47068 14.4726C4.17779 14.7655 4.17779 15.2403 4.47068 15.5332C4.76357 15.8261 5.23845 15.8261 5.53134 15.5332L9.11807 11.9465C9.60623 11.4583 10.3977 11.4583 10.8858 11.9465L14.4726 15.5332C14.7655 15.8261 15.2403 15.8261 15.5332 15.5332C15.8261 15.2403 15.8261 14.7655 15.5332 14.4726L11.9465 10.8858C11.4583 10.3977 11.4583 9.60623 11.9465 9.11807L15.5342 5.53033C15.8271 5.23744 15.8271 4.76256 15.5342 4.46967C15.2413 4.17678 14.7665 4.17678 14.4736 4.46967L10.8858 8.05741C10.3977 8.54556 9.60623 8.54557 9.11807 8.05741L5.53033 4.46967Z"
              fill="#241F21"
            />
          </svg>
        </button>

      </div>
    </div>

    <script>
      const shell = document.getElementById("searchShell");
      const dynamicWrap = document.getElementById("dynamicWrap");
      const shape = document.getElementById("shape");
      const bridge = document.getElementById("bridge");
      const rect1 = document.getElementById("rect1");
      const btn = document.getElementById("toggleBtn");
      const input = document.getElementById("searchInput");

      const CLOSE_MODE = true;

      const bridgeOpen =
        "M43.02922778103873 29.947286628412307 C46.440616756960296 25.10807502694411, 51.4593832430397 25.10807502694411, 54.87077221896127 29.947286628412307 L54.87077221896127 8.052713371587695 C51.4593832430397 12.89192497305589, 46.440616756960296 12.89192497305589, 43.02922778103873 8.052713371587695 Z";

      let open = false;
      let hover = false;
      let runningAnims = [];
      let shapeRaf = 0;

      const R = 12.920000000000002;
      const RECT_START_CLOSED = 44;
      const RECT_START_OPEN = 54;
      const RECT_END_OPEN = 568;
      const BUTTON_WIDTH = 44;
      const RETRACT_X = 31.08;
      const TRANSITION_SPLIT = 0.82;
      const SHAPE_T_AT_BUTTON = RETRACT_X / (RECT_END_OPEN - RECT_START_OPEN);

      const bridgeClosed = {
        x: [44, 44, 44, 44, 44, 44, 44, 44],
        y: [25.08, 25.08, 25.08, 25.08, 12.92, 12.92, 12.92, 12.92]
      };
      const bridgeOpened = {
        x: [
          43.02922778103873, 46.440616756960296, 51.4593832430397, 54.87077221896127, 54.87077221896127,
          51.4593832430397, 46.440616756960296, 43.02922778103873
        ],
        y: [
          29.947286628412307, 25.10807502694411, 25.10807502694411, 29.947286628412307, 8.052713371587695,
          12.89192497305589, 12.89192497305589, 8.052713371587695
        ]
      };

      function syncFill() {
        const fill = open || hover ? "rgba(255, 255, 255, 0.96)" : "rgba(255, 255, 255, 0)";
        shape.style.setProperty("--bg-fill", fill);
        shell.style.setProperty("--bg-fill", fill);
      }

      function syncShell() {
        shell.classList.toggle("open", open);
      }

      function stopAnims() {
        runningAnims.forEach((a) => a.cancel());
        runningAnims = [];
        if (shapeRaf) {
          cancelAnimationFrame(shapeRaf);
          shapeRaf = 0;
        }
      }

      function syncInputToShape(t, opening, rectWidth = 0) {
        let p = 0;
        if (opening) {
          // 开启时按几何宽度同步出现，避免和背景脱节
          p = Math.max(0, Math.min(1, (rectWidth - 80) / 180));
        } else {
          // 关闭时按背景宽度退场（比按时间更稳定）
          // 宽度小于约 220 时开始快速消失，避免尾帧残留
          p = Math.max(0, Math.min(1, (rectWidth - 220) / 180));
        }
        input.style.opacity = String(p);
        input.style.transform = `translateX(${lerp(-12, 0, p)}px)`;
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function cubicBezier(x1, y1, x2, y2) {
        const cx = 3 * x1;
        const bx = 3 * (x2 - x1) - cx;
        const ax = 1 - cx - bx;
        const cy = 3 * y1;
        const by = 3 * (y2 - y1) - cy;
        const ay = 1 - cy - by;

        const sampleX = (t) => ((ax * t + bx) * t + cx) * t;
        const sampleY = (t) => ((ay * t + by) * t + cy) * t;
        const sampleDX = (t) => (3 * ax * t + 2 * bx) * t + cx;

        const solveT = (x) => {
          let t = x;
          for (let i = 0; i < 7; i += 1) {
            const xEst = sampleX(t) - x;
            const d = sampleDX(t);
            if (Math.abs(xEst) < 1e-5) return t;
            if (Math.abs(d) < 1e-6) break;
            t -= xEst / d;
          }
          let t0 = 0;
          let t1 = 1;
          t = x;
          while (t0 < t1) {
            const xEst = sampleX(t);
            if (Math.abs(xEst - x) < 1e-5) return t;
            if (x > xEst) t0 = t;
            else t1 = t;
            t = (t1 - t0) * 0.5 + t0;
          }
          return t;
        };

        return (x) => sampleY(solveT(x));
      }

      function buildRectPath(startX, endX) {
        if (endX <= startX + 0.001) return `M${startX} 0L${startX} 0L${startX} 38L${startX} 38 Z`;
        const width = endX - startX;
        const rr = Math.min(R, width * 0.5);
        const topArc = rr;
        const bottomArc = 38 - rr;
        const leftInner = startX + rr;
        const rightInner = endX - rr;
        return `M${startX} ${topArc} A${rr} ${rr} 0 0 1 ${leftInner} 0 L${rightInner} 0 A${rr} ${rr} 0 0 1 ${endX} ${topArc} L${endX} ${bottomArc} A${rr} ${rr} 0 0 1 ${rightInner} 38 L${leftInner} 38 A${rr} ${rr} 0 0 1 ${startX} ${bottomArc} Z`;
      }

      function buildBridgePath(t) {
        const x = bridgeClosed.x.map((v, i) => lerp(v, bridgeOpened.x[i], t));
        const y = bridgeClosed.y.map((v, i) => lerp(v, bridgeOpened.y[i], t));
        return `M${x[0]} ${y[0]} C${x[1]} ${y[1]}, ${x[2]} ${y[2]}, ${x[3]} ${y[3]} L${x[4]} ${y[4]} C${x[5]} ${y[5]}, ${x[6]} ${y[6]}, ${x[7]} ${y[7]} Z`;
      }

      function applyShape(t) {
        const startX = lerp(RECT_START_CLOSED, RECT_START_OPEN, t);
        const endX = lerp(RECT_START_CLOSED, RECT_END_OPEN, t);
        rect1.setAttribute("d", buildRectPath(startX, endX));
        bridge.setAttribute("d", buildBridgePath(t));
      }

      function animateShape(opening) {
        const duration = opening ? 620 : 500;
        const ease = opening ? cubicBezier(0.22, 0.01, 0.35, 1) : cubicBezier(0.55, 0.055, 0.675, 0.19);
        const start = performance.now();
        dynamicWrap.style.visibility = "visible";

        const tick = (now) => {
          const p = Math.min(1, (now - start) / duration);
          const ep = ease(p);
          let t = 0;
          let x = 0;

          if (opening) {
            if (ep < TRANSITION_SPLIT) {
              const local = ep / TRANSITION_SPLIT;
              t = lerp(0, SHAPE_T_AT_BUTTON, local);
              x = lerp(-RETRACT_X, 0, local);
            } else {
              const local = (ep - TRANSITION_SPLIT) / (1 - TRANSITION_SPLIT);
              t = lerp(SHAPE_T_AT_BUTTON, 1, local);
              x = 0;
            }
          } else if (ep < TRANSITION_SPLIT) {
            const local = ep / TRANSITION_SPLIT;
            t = lerp(1, SHAPE_T_AT_BUTTON, local);
            x = lerp(0, -RETRACT_X, local);
          } else {
            const local = (ep - TRANSITION_SPLIT) / (1 - TRANSITION_SPLIT);
            t = lerp(SHAPE_T_AT_BUTTON, 0, local);
            x = -RETRACT_X;
          }

          const currentStartX = lerp(RECT_START_CLOSED, RECT_START_OPEN, t);
          const currentEndX = lerp(RECT_START_CLOSED, RECT_END_OPEN, t);
          const rectWidth = Math.max(0, currentEndX - currentStartX);
          applyShape(t);
          syncInputToShape(t, opening, rectWidth);
          dynamicWrap.style.transform = `translateX(${x}px)`;
          if (p < 1) {
            shapeRaf = requestAnimationFrame(tick);
          } else {
            shapeRaf = 0;
            applyShape(opening ? 1 : 0);
            const endRectWidth = opening ? RECT_END_OPEN - RECT_START_OPEN : 0;
            syncInputToShape(opening ? 1 : 0, opening, endRectWidth);
            dynamicWrap.style.transform = `translateX(${opening ? 0 : -RETRACT_X}px)`;
            if (!opening) {
              dynamicWrap.style.visibility = "hidden";
              bridge.setAttribute("d", "");
              rect1.setAttribute("d", "");
            }
          }
        };
        shapeRaf = requestAnimationFrame(tick);
      }

      function animateExpand(opening) {
        stopAnims();
        animateShape(opening);
      }

      btn.addEventListener("mouseenter", () => {
        hover = true;
        syncFill();
      });
      btn.addEventListener("mouseleave", () => {
        hover = false;
        syncFill();
      });

      btn.addEventListener("click", () => {
        if (!open) {
          open = true;
          syncShell();
          syncFill();
          animateExpand(true);
          setTimeout(() => input.focus(), 180);
          return;
        }

        if (CLOSE_MODE && input.value) {
          input.value = "";
          input.focus();
          return;
        }

        open = false;
        syncShell();
        syncFill();
        animateExpand(false);
      });

      // init
      applyShape(0);
      syncShell();
      syncFill();
      dynamicWrap.style.opacity = "1";
      dynamicWrap.style.visibility = "hidden";
      dynamicWrap.style.transform = `translateX(-${RETRACT_X}px)`;
      input.style.opacity = "0";
      input.style.transform = "translateX(-12px)";
    </script>
  </body>
</html>
