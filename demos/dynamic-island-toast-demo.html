<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floema 风格小球提示 Demo</title>
  <style>
    :root {
      --pill-h: 36px;
      --ball: 32px;
      --page: #e8e1d0;
      --paper: #f3eddf;
      --ink: #20231d;
      --muted: rgba(32, 35, 29, 0.62);
      --line: rgba(32, 35, 29, 0.16);
      --olive: #586247;
      --moss: #727d5d;
      --clay: #b87d55;
      --success: #667a48;
      --info: #5f6f86;
      --warning: #b87d55;
      --error: #9a4f43;
      --pill-bg: rgba(246, 241, 230, 0.92);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(184, 125, 85, 0.22), transparent 28%),
        radial-gradient(circle at 80% 8%, rgba(114, 125, 93, 0.18), transparent 26%),
        linear-gradient(135deg, #efe8d8 0%, var(--page) 48%, #d8d1bd 100%);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 116px 20px 48px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 18px;
      border: 1px solid rgba(32, 35, 29, 0.07);
      border-radius: 28px;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(32, 35, 29, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 35, 29, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 82%, transparent);
      pointer-events: none;
    }

    p.lead {
      margin: 0 0 30px;
      max-width: 360px;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.8vw, 1.05rem);
      line-height: 1.7;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--olive);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0 0 20px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.4rem, 11vw, 8.8rem);
      font-weight: 400;
      line-height: 0.86;
      letter-spacing: -0.075em;
      text-align: center;
    }

    .canvas {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(100%, 980px);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(243, 237, 223, 0.48);
      box-shadow:
        inset 0 0 0 1px rgba(32, 35, 29, 0.08),
        0 28px 80px rgba(64, 56, 42, 0.08);
      backdrop-filter: blur(18px);
    }

    button {
      appearance: none;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #f3eddf;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(32, 35, 29, 0.18);
      transition:
        transform 0.2s var(--ease),
        background 0.25s ease,
        color 0.25s ease,
        box-shadow 0.25s ease;
    }

    button:hover {
      background: transparent;
      color: var(--ink);
      box-shadow: 0 10px 28px rgba(32, 35, 29, 0.1);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pin-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px 0 6px;
      color: rgba(32, 35, 29, 0.62);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .pin-toggle input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .pin-toggle .switch {
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: rgba(32, 35, 29, 0.12);
      box-shadow: inset 0 0 0 1px rgba(32, 35, 29, 0.08);
      position: relative;
      transition: background 0.22s ease;
    }

    .pin-toggle .switch::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--paper);
      box-shadow: 0 4px 10px rgba(32, 35, 29, 0.14);
      transition: transform 0.22s var(--ease);
    }

    .pin-toggle input:checked + .switch {
      background: rgba(88, 98, 71, 0.32);
    }

    .pin-toggle input:checked + .switch::before {
      transform: translateX(14px);
    }

    /* 顶部锚点 */
    .dock {
      position: fixed;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      justify-content: center;
    }

    /* 外壳：从正圆 → 横向胶囊，仅靠 width + border-radius 过渡 */
    .pill {
      --w: var(--pill-h);
      height: var(--pill-h);
      width: var(--w);
      max-width: 90vw;
      border-radius: calc(var(--pill-h) / 2);
      background: var(--pill-bg);
      border: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.48),
        inset 0 -1px 0 rgba(32, 35, 29, 0.06),
        0 18px 45px rgba(62, 55, 42, 0.14),
        0 5px 16px rgba(62, 55, 42, 0.08);
      display: flex;
      align-items: center;
      flex-direction: row;
      overflow: hidden;
      backdrop-filter: blur(22px);
      touch-action: none;
      cursor: pointer;
      transition:
        width 0.62s var(--ease),
        height 0.52s var(--ease),
        border-radius 0.55s var(--ease),
        box-shadow 0.4s ease,
        opacity 0.32s ease,
        transform 0.4s var(--ease);
      will-change: width, height;
    }

    .pill[data-phase="idle"] {
      opacity: 0;
      transform: translateY(-12px) scale(0.92);
      pointer-events: none;
      transition:
        opacity 0.25s ease,
        transform 0.35s var(--ease),
        height 0.52s var(--ease),
        width 0.62s var(--ease),
        border-radius 0.55s var(--ease);
    }

    .pill[data-resetting="true"] {
      transition: none !important;
    }

    .pill[data-phase="loading"],
    .pill[data-phase="success"] {
      opacity: 1;
      transform: translateY(var(--swipe-y, 0px)) scale(1);
    }

    .pill[data-phase="loading"] {
      --w: var(--pill-h);
    }

    .pill[data-phase="success"] {
      --w: min(90vw, var(--success-w, 238px));
      border-radius: calc(var(--pill-h) / 2);
    }

    .pill[data-grow="true"] {
      height: var(--wrap-h, var(--pill-h));
      border-radius: 18px;
    }

    .pill[data-wrap="true"] {
      align-items: flex-start;
    }

    .pill[data-wrap="true"] .ball-slot {
      align-self: center;
    }

    .pill[data-has-message="false"] .msg {
      width: 0;
      max-width: 0;
      padding: 0;
      visibility: hidden;
      opacity: 0;
    }

    /* 左侧小球区域：宽度固定，始终在椭圆最左 */
    .ball-slot {
      flex: 0 0 var(--pill-h);
      width: var(--pill-h);
      height: var(--pill-h);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ball {
      width: var(--ball);
      height: var(--ball);
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      transition: transform 0.45s var(--ease);
    }

    /* 简洁 SVG 转圈 */
    .ball .ring {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 2;
      opacity: 1;
      overflow: visible;
      transform-origin: center;
      transform-box: fill-box;
      backface-visibility: hidden;
      transition:
        opacity 0.28s ease,
        transform 0.45s var(--ease);
    }

    .pill[data-phase="loading"] .ball .ring {
      transition: opacity 0.28s ease;
      will-change: transform;
    }

    .ball .ring .track {
      fill: none;
      stroke: rgba(32, 35, 29, 0.08);
      stroke-width: 2;
    }

    .ball .ring .arc {
      fill: none;
      stroke: var(--ink);
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-dasharray: 15 85;
      opacity: var(--spin-opacity, 0.96);
      filter: drop-shadow(0 0 2px rgba(32, 35, 29, 0.08));
      transform-origin: center;
      transform-box: fill-box;
    }

    .ball .ring .arc-primary {
      stroke-dashoffset: 8;
    }

    .ball .ring .arc-secondary {
      stroke-dashoffset: 58;
    }

    .pill[data-phase="success"] .ball .ring {
      opacity: 0;
      transform: scale(0.88);
      animation: none;
    }

    .ball .core {
      position: absolute;
      z-index: 1;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      opacity: 0;
      transform: scale(0.35);
      transform-origin: center;
      box-shadow: 0 0 0 0 rgba(102, 122, 72, 0);
      transition:
        opacity 0.2s ease,
        transform 0.58s var(--ease),
        background 0.35s ease,
        width 0.45s var(--ease),
        height 0.45s var(--ease),
        border-radius 0.45s var(--ease),
        box-shadow 0.48s var(--ease);
    }

    .pill[data-phase="success"] .ball .core {
      width: 28px;
      height: 28px;
      opacity: 1;
      transform: scale(1);
    }

    .pill[data-variant="warning"] .ball .core {
      background: var(--warning);
    }

    .pill[data-variant="info"] .ball .core {
      background: var(--info);
    }

    .pill[data-variant="error"] .ball .core {
      background: var(--error);
    }

    /* 对勾：成功后在球内显示 */
    .ball .check {
      position: absolute;
      z-index: 3;
      width: 14px;
      height: 14px;
      opacity: 0;
      transform: scale(0.5) rotate(-12deg);
      transition: opacity 0.3s ease 0.24s, transform 0.45s var(--ease) 0.22s;
      pointer-events: none;
    }

    .pill[data-phase="success"] .ball .check {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .ball .check svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ball .check path {
      fill: none;
      stroke: var(--paper);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
    }

    .pill[data-phase="success"] .ball .check path {
      animation: draw-check 0.45s var(--ease) 0.18s forwards;
    }

    @keyframes draw-check {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* 右侧文案：loading 时不占宽，success 时展开 */
    .msg {
      flex: 0 0 auto;
      width: var(--msg-w, auto);
      min-width: 0;
      padding: 0 14px 0 6px;
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transform: none;
      max-width: var(--msg-w, 320px);
      transition: none;
    }

    .pill[data-phase="success"] .msg {
      visibility: visible;
      opacity: 1;
    }

    .pill[data-wrap="true"] .msg,
    .pill[data-closing="true"] .msg {
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }

    .hint {
      margin-top: 28px;
      color: rgba(32, 35, 29, 0.46);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      body {
        justify-content: flex-start;
        padding-top: 148px;
      }

      body::before {
        inset: 12px;
        border-radius: 22px;
      }

      h1 {
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="dock">
    <div class="pill" id="pill" data-phase="idle" aria-live="polite">
      <div class="ball-slot">
        <div class="ball" aria-hidden="true">
          <svg class="ring" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="track" cx="12" cy="12" r="9"></circle>
            <circle class="arc arc-primary" cx="12" cy="12" r="9" pathLength="100"></circle>
            <circle class="arc arc-secondary" cx="12" cy="12" r="9" pathLength="100"></circle>
          </svg>
          <span class="core"></span>
          <span class="check">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12l5 5L20 7" />
            </svg>
          </span>
        </div>
      </div>
      <span class="msg" id="msg">success!</span>
    </div>
  </div>

  <main class="canvas">
    <p class="eyebrow">Micro Interaction</p>
    <h1>Made to last.</h1>
    <p class="lead">一个克制、自然材质感的顶部反馈：小球等待，成功后延展为椭圆提示，像产品页面里的轻量交互。</p>

    <div class="actions">
      <button type="button" id="btn" data-state="success">Success</button>
      <button type="button" data-state="info">Info</button>
      <button type="button" data-state="warning">Warning</button>
      <button type="button" data-state="error">Error</button>
      <label class="pin-toggle">
        <input type="checkbox" id="pinToggle" />
        <span class="switch" aria-hidden="true"></span>
        Keep visible
      </label>
    </div>

    <p class="hint">Click to preview the toast</p>
  </main>

  <script>
    (function () {
      const pill = document.getElementById("pill");
      const buttons = Array.from(document.querySelectorAll("[data-state]"));
      const pinToggle = document.getElementById("pinToggle");
      const msg = document.getElementById("msg");
      const ring = document.querySelector(".ring");
      const primaryArc = document.querySelector(".arc-primary");
      const secondaryArc = document.querySelector(".arc-secondary");
      const iconPath = document.querySelector(".check path");
      const LOADING_MS = 1400;
      const states = {
        success: {
          label: "lorm lasjdf lskdjf lsf lksd fskdjfla ksdfj fsdflsadkjfl sjadklfj salkdfjlksdjf lorm lasjdf lskdjf lsf lksd fskdjfla ksdfj fsdflsadkjfl sjadklfj salkdfjlksdjf skadjflksdjf lksdf asdlkflsdf lksd skadjflksdjf lksdf asdlkflsdf lksd f sd lsdkfj skldflskjd fsdlkf sdlkf sl dflfslkdfslkd f!",
          icon: "M5 12l5 5L20 7",
        },
        info: {
          label: "info!",
          icon: "M12 10v7M12 7h.01",
        },
        warning: {
          label: "",
          icon: "M12 6v8M12 18h.01",
        },
        error: {
          label: "error!",
          icon: "M7 7l10 10M17 7L7 17",
        },
      };

      function setPhase(phase) {
        pill.dataset.phase = phase;
      }

      let t = null;
      let spinFrame = null;
      let spinAngle = 0;
      let spinStart = 0;
      let lastSpinTime = 0;
      let shapeAnimation = null;
      let swipeStartY = 0;
      let isSwiping = false;

      function resetShapeAnimation() {
        if (shapeAnimation) shapeAnimation.cancel();
        shapeAnimation = null;
        pill.getAnimations().forEach(function (animation) {
          animation.cancel();
        });
        pill.dataset.resetting = "true";
        pill.dataset.phase = "idle";
        pill.dataset.wrap = "false";
        pill.dataset.grow = "false";
        pill.dataset.closing = "false";
        pill.style.width = "";
        pill.style.height = "";
        pill.style.borderRadius = "";
        pill.style.removeProperty("--swipe-y");
        void pill.offsetWidth;
        pill.dataset.resetting = "false";
      }

      function stopSpin() {
        if (spinFrame) cancelAnimationFrame(spinFrame);
        spinFrame = null;
        ring.style.transform = "";
        ring.style.removeProperty("--spin-opacity");
        primaryArc.style.transform = "";
        secondaryArc.style.transform = "";
      }

      function startSpin() {
        stopSpin();
        spinAngle = 0;
        spinStart = performance.now();
        lastSpinTime = spinStart;
        primaryArc.style.transform = "rotate(0deg)";
        secondaryArc.style.transform = "rotate(0deg)";

        function tick(now) {
          const dt = (now - lastSpinTime) / 1000;
          const elapsed = now - spinStart;
          const progress = Math.min(elapsed / LOADING_MS, 1);
          const smooth = progress * progress * progress;
          const speed = 420 + smooth * 4300;
          const visualSoftness = Math.min(progress * 1.35, 1);

          lastSpinTime = now;
          spinAngle = (spinAngle + speed * dt) % 360;
          ring.style.setProperty("--spin-opacity", String(0.92 - visualSoftness * 0.22));
          primaryArc.style.transform = "rotate(" + spinAngle + "deg)";
          secondaryArc.style.transform = "rotate(" + -spinAngle + "deg)";
          spinFrame = requestAnimationFrame(tick);
        }

        spinFrame = requestAnimationFrame(tick);
      }

      function updateSuccessWidth() {
        const pillHeight = parseFloat(getComputedStyle(pill).getPropertyValue("--pill-h"));
        const hasMessage = pill.dataset.hasMessage !== "false";
        const messageWidth = hasMessage ? getNaturalMessageWidth() : 0;
        const contentWidth = pillHeight + messageWidth;
        const maxWidth = window.innerWidth * 0.9;
        const successWidth = Math.min(contentWidth, maxWidth);
        const msgWidth = Math.max(0, successWidth - pillHeight);
        const shouldWrap = contentWidth > maxWidth;
        const wrapHeight = getWrappedHeight(msgWidth, pillHeight);

        pill.style.setProperty("--success-w", Math.ceil(successWidth) + "px");
        pill.style.setProperty("--msg-w", Math.ceil(msgWidth) + "px");
        pill.style.setProperty("--wrap-h", Math.ceil(wrapHeight) + "px");
        pill.dataset.shouldWrap = shouldWrap ? "true" : "false";

        return {
          pillHeight,
          successWidth,
          wrapHeight,
          shouldWrap,
        };
      }

      function getNaturalMessageWidth() {
        const measure = document.createElement("span");
        const msgStyle = getComputedStyle(msg);
        measure.textContent = msg.textContent;
        measure.style.position = "fixed";
        measure.style.left = "-9999px";
        measure.style.top = "0";
        measure.style.visibility = "hidden";
        measure.style.boxSizing = "border-box";
        measure.style.whiteSpace = "nowrap";
        measure.style.padding = msgStyle.padding;
        measure.style.font = msgStyle.font;
        measure.style.fontWeight = msgStyle.fontWeight;
        measure.style.letterSpacing = msgStyle.letterSpacing;
        measure.style.textTransform = msgStyle.textTransform;
        document.body.appendChild(measure);
        const width = measure.getBoundingClientRect().width;
        measure.remove();
        return width;
      }

      function getWrappedHeight(msgWidth, pillHeight) {
        if (msgWidth <= 0) return pillHeight;

        const measure = document.createElement("div");
        const msgStyle = getComputedStyle(msg);
        measure.textContent = msg.textContent;
        measure.style.position = "fixed";
        measure.style.left = "-9999px";
        measure.style.top = "0";
        measure.style.visibility = "hidden";
        measure.style.boxSizing = "border-box";
        measure.style.width = msgWidth + "px";
        measure.style.padding = msgStyle.padding;
        measure.style.font = msgStyle.font;
        measure.style.fontWeight = msgStyle.fontWeight;
        measure.style.letterSpacing = msgStyle.letterSpacing;
        measure.style.textTransform = msgStyle.textTransform;
        measure.style.lineHeight = msgStyle.lineHeight;
        measure.style.whiteSpace = "normal";
        measure.style.overflowWrap = "anywhere";
        document.body.appendChild(measure);
        const height = Math.max(pillHeight, measure.getBoundingClientRect().height);
        measure.remove();
        return height;
      }

      function hideToast() {
        if (t) clearTimeout(t);
        resetShapeAnimation();
        stopSpin();
        pill.dataset.closing = "true";
        setPhase("idle");
        buttons.forEach(function (button) {
          button.disabled = false;
        });
        t = null;
      }

      function runWrappedShapeAnimation(dimensions) {
        const radius = dimensions.pillHeight / 2;

        if (shapeAnimation) shapeAnimation.cancel();
        pill.dataset.resetting = "true";
        pill.dataset.wrap = "true";
        pill.dataset.grow = "false";
        pill.style.width = dimensions.pillHeight + "px";
        pill.style.height = dimensions.pillHeight + "px";
        pill.style.borderRadius = radius + "px";
        setPhase("success");
        void pill.offsetWidth;
        pill.dataset.resetting = "false";

        shapeAnimation = pill.animate(
          [
            {
              width: dimensions.pillHeight + "px",
              height: dimensions.pillHeight + "px",
              borderRadius: radius + "px",
              offset: 0,
            },
            {
              width: dimensions.successWidth + "px",
              height: dimensions.pillHeight + "px",
              borderRadius: radius + "px",
              offset: 0.68,
            },
            {
              width: dimensions.successWidth + "px",
              height: dimensions.wrapHeight + "px",
              borderRadius: "18px",
              offset: 1,
            },
          ],
          {
            duration: 980,
            easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            fill: "both",
          }
        );

        shapeAnimation.addEventListener("finish", function () {
          pill.dataset.grow = "true";
          pill.style.width = "";
          pill.style.height = "";
          pill.style.borderRadius = "";
          shapeAnimation.cancel();
          shapeAnimation = null;
        }, { once: true });
      }

      function showToast(type) {
        const state = states[type] || states.success;
        if (t) clearTimeout(t);
        resetShapeAnimation();
        buttons.forEach(function (button) {
          button.disabled = true;
        });

        msg.textContent = state.label;
        iconPath.setAttribute("d", state.icon);
        pill.dataset.variant = type;
        pill.dataset.hasMessage = state.label.trim() ? "true" : "false";
        pill.dataset.wrap = "false";
        pill.dataset.grow = "false";
        pill.dataset.closing = "false";
        setPhase("loading");
        startSpin();

        t = setTimeout(function () {
          stopSpin();
          const dimensions = updateSuccessWidth();

          if (dimensions.shouldWrap) {
            runWrappedShapeAnimation(dimensions);
          } else {
            pill.dataset.wrap = "false";
            pill.dataset.grow = "false";
            pill.style.width = "";
            pill.style.height = "";
            pill.style.borderRadius = "";
            setPhase("success");
          }

          buttons.forEach(function (button) {
            button.disabled = false;
          });

          if (pinToggle.checked) {
            t = null;
            return;
          }

          t = setTimeout(function () {
            pill.dataset.closing = "true";
            setPhase("idle");
            t = null;
          }, 2600);
        }, LOADING_MS);
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          showToast(button.dataset.state);
        });
      });

      pinToggle.addEventListener("change", function () {
        if (pinToggle.checked || pill.dataset.phase !== "success") return;
        if (t) clearTimeout(t);
        pill.dataset.closing = "true";
        setPhase("idle");
        t = null;
      });

      pill.addEventListener("transitionend", function (event) {
        if (event.propertyName !== "width") return;

        if (pill.dataset.phase === "idle") {
          pill.dataset.wrap = "false";
          pill.dataset.grow = "false";
          pill.dataset.closing = "false";
        }
      });

      pill.addEventListener("pointerdown", function (event) {
        if (pill.dataset.phase === "idle") return;
        swipeStartY = event.clientY;
        isSwiping = true;
        pill.setPointerCapture(event.pointerId);
      });

      pill.addEventListener("pointermove", function (event) {
        if (!isSwiping) return;
        const deltaY = event.clientY - swipeStartY;
        const y = Math.min(0, deltaY);
        pill.style.setProperty("--swipe-y", y + "px");
      });

      function endSwipe(event) {
        if (!isSwiping) return;
        isSwiping = false;
        const deltaY = event.clientY - swipeStartY;

        if (deltaY < -32) {
          hideToast();
          return;
        }

        pill.style.removeProperty("--swipe-y");
      }

      pill.addEventListener("pointerup", endSwipe);
      pill.addEventListener("pointercancel", endSwipe);
    })();
  </script>
</body>
