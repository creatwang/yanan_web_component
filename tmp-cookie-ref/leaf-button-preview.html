<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Sketch bracket frame</title>
  <style>
    body { margin: 0; padding: 32px; font-family: Inter, system-ui, sans-serif; background: #f5f0ee; color: #241f21; }
    h1 { font-size: 15px; font-weight: 600; margin: 0 0 6px; }
    p { font-size: 13px; color: #6f696b; margin: 0 0 24px; max-width: 520px; line-height: 1.5; }
    .row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    figure { margin: 0; background: #fff; padding: 10px; border: 1px dashed #241f21; border-radius: 4px; }
    figcaption { font-size: 11px; color: #888; margin-top: 6px; }
    figure img { display: block; height: 64px; width: auto; }
    .panel {
      display: inline-block;
      background: #fff;
      border: 1px dashed #241f21;
      padding: 32px 28px;
    }
    .demo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.12em;
      min-height: 44px;
      padding: 8px 18px 10px;
      color: #241f21;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: none;
      background: none;
      position: relative;
      isolation: isolate;
    }
    .demo-btn::before {
      content: "";
      position: absolute;
      inset: -7px -10px;
      z-index: -1;
      background-image: var(--left), var(--right), var(--center);
      background-position: left center, right center, calc(2.35em * 0.28) center;
      background-repeat: no-repeat, no-repeat, repeat-x;
      background-size: auto 2.35em, auto 2.35em, calc(2.35em * 0.08) 2.35em;
    }
  </style>
</head>
<body>
  <h1>Sketch Bracket Frame（对齐线稿参考）</h1>
  <p>仅描边：上藤密、下藤疏、两侧外弯括号。无填充底色，与 Cookie 面板虚线框风格一致。</p>
  <div class="row" id="tiles"></div>
  <div class="panel">
    <button class="demo-btn" id="btn1" type="button"><strong>[</strong><span>accept cookies</span><strong>]</strong></button>
    <button class="demo-btn" id="btn2" type="button" style="min-width:190px;margin-left:16px;"><strong>[</strong><span>save preferences</span><strong>]</strong></button>
  </div>
  <script type="module">
    import {
      YN_COOKIE_NOTICE_BUTTON_BG_LEFT_URI,
      YN_COOKIE_NOTICE_BUTTON_BG_CENTER_URI,
      YN_COOKIE_NOTICE_BUTTON_BG_RIGHT_URI,
    } from "../src/components/yn-cookie-notice/cookie-notice-icons.ts";

    const decode = (uri) => uri.slice(5, -2).replace(/^"/, "").replace(/"$/, "");

    for (const [label, uri] of [
      ["Left bracket", YN_COOKIE_NOTICE_BUTTON_BG_LEFT_URI],
      ["Center repeat", YN_COOKIE_NOTICE_BUTTON_BG_CENTER_URI],
      ["Right bracket", YN_COOKIE_NOTICE_BUTTON_BG_RIGHT_URI],
    ]) {
      const fig = document.createElement("figure");
      const img = document.createElement("img");
      img.src = decode(uri);
      const cap = document.createElement("figcaption");
      cap.textContent = label;
      fig.append(img, cap);
      document.getElementById("tiles").append(fig);
    }

    for (const id of ["btn1", "btn2"]) {
      const el = document.getElementById(id);
      el.style.setProperty("--left", YN_COOKIE_NOTICE_BUTTON_BG_LEFT_URI);
      el.style.setProperty("--center", YN_COOKIE_NOTICE_BUTTON_BG_CENTER_URI);
      el.style.setProperty("--right", YN_COOKIE_NOTICE_BUTTON_BG_RIGHT_URI);
    }
  </script>
</body>
</html>
