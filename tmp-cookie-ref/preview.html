<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #f5f5f5; padding: 24px; font-family: sans-serif; }
    section { margin-bottom: 32px; background: #fff; padding: 16px; border: 1px dashed #000; }
    img { image-rendering: pixelated; }
    .row { display: flex; gap: 24px; align-items: center; }
    .holder { width: 428px; }
  </style>
</head>
<body>
  <section>
    <h3>Checkbox 64x64 (native)</h3>
    <div class="row">
      <div><p>default</p><img src="../src/asset/image/cookie-notice/checkbox-default.webp" width="64" height="64"></div>
      <div><p>hover</p><img src="../src/asset/image/cookie-notice/checkbox-hover.webp" width="64" height="64"></div>
      <div><p>checked</p><img src="../src/asset/image/cookie-notice/checkbox-checked.webp" width="64" height="64"></div>
      <div><p>1.8em scale</p><img src="../src/asset/image/cookie-notice/checkbox-default.webp" style="width:1.8em;height:1.8em"></div>
    </div>
  </section>
  <section>
    <h3>modal_holder (50% width)</h3>
    <img class="holder" src="../src/asset/image/cookie-notice/modal_holder.webp" alt="">
  </section>
</body>
</html>
